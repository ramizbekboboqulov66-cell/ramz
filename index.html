<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTAURAND RAMZ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

/* HEADER */

header{
background:linear-gradient(45deg,#8E0E00,#1F1C18);
color:white;
text-align:center;
padding:30px;
font-size:45px;
font-weight:bold;
letter-spacing:4px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* CONTAINER */

.container{
width:95%;
margin:auto;
padding:30px 0;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:20px;
}

.content h2{
color:#c0392b;
margin-bottom:10px;
}

.price{
color:#27ae60;
font-size:25px;
font-weight:bold;
margin-bottom:10px;
}

.item-total{
font-size:18px;
color:#e67e22;
margin-bottom:15px;
font-weight:bold;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

button{
width:42px;
height:42px;
border:none;
border-radius:50%;
font-size:24px;
color:white;
cursor:pointer;
}

.plus{
background:#2ecc71;
}

.minus{
background:#e74c3c;
}

.count{
font-size:22px;
width:40px;
text-align:center;
}

/* ORDER */

.order-box{
background:white;
margin-top:40px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.order-box h2{
color:#c0392b;
margin-bottom:20px;
}

.total{
font-size:30px;
color:#27ae60;
font-weight:bold;
margin:20px 0;
}

input,select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:17px;
}

.main-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff512f,#dd2476);
color:white;
font-size:20px;
cursor:pointer;
}

.receipt{
margin-top:30px;
background:#111827;
color:white;
padding:25px;
border-radius:20px;
display:none;
}

.receipt h2{
margin-bottom:15px;
color:#2ecc71;
}

.receipt p{
margin:10px 0;
font-size:18px;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
color:#555;
font-size:18px;
}

</style>
</head>
<body>

<header>
🍽️ RESTAURAND RAMZ
</header>

<div class="container">

<div class="menu" id="menu"></div>

<!-- ORDER -->

<div class="order-box">

<h2>🛒 Zakaz Bo'limi</h2>

<p>Mahsulotlar soni: <span id="items">0</span></p>

<div class="total">
Jami: <span id="total">0</span> so'm
</div>

<input type="text" id="name" placeholder="Ismingiz">

<select id="service">
<option value="restoran">🍴 Restoranda o'tirib ovqatlanish</option>
<option value="delivery">🚚 Dostavka xizmati</option>
</select>

<input type="text" id="address" placeholder="Manzil">

<select id="payment">
<option>💵 Naqd pul</option>
<option>💳 Karta</option>
<option>📱 Click / Payme</option>
</select>

<button class="main-btn" onclick="orderNow()">
✅ Zakaz Berish
</button>

<div class="receipt" id="receipt">

<h2>🧾 CHEK</h2>

<div id="receipt-items"></div>

<p id="customer"></p>
<p id="serviceType"></p>
<p id="delivery"></p>
<p id="paymentType"></p>
<p id="productCount"></p>
<p id="finalPrice"></p>

<hr style="margin:15px 0;">

<p>⏰ Tayyor bo'lish vaqti: 20-40 daqiqa</p>

<h3 style="margin-top:20px;color:#2ecc71;">
RAHMAT ❤️
</h3>

</div>

</div>

</div>

<footer>
📍 Nurota shahri | 📞 +998 95 040 42 26
</footer>

<script>

const foods = [

{
name:"Osh",
price:45000,
image:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4"
},

{
name:"Manti",
price:38000,
image:"https://images.unsplash.com/photo-1544025162-d76694265947"
},

{
name:"Lag'mon",
price:40000,
image:"https://images.unsplash.com/photo-1555126634-323283e090fa"
},

{
name:"Shashlik",
price:25000,
image:"https://images.unsplash.com/photo-1529193591184-b1d58069ecdd"
},

{
name:"Somsa",
price:12000,
image:"https://images.unsplash.com/photo-1504674900247-0877df9cc836"
},

{
name:"Burger",
price:35000,
image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
},

{
name:"Pizza",
price:80000,
image:"https://images.unsplash.com/photo-1513104890138-7c749659a591"
},

{
name:"Coca Cola",
price:12000,
image:"https://images.unsplash.com/photo-1629203851122-3726ecdf080e"
}

];

const menu = document.getElementById("menu");

let totalPrice = 0;
let totalItems = 0;

let cart = {};

foods.forEach(food => {

const card = document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<img src="${food.image}">

<div class="content">

<h2>${food.name}</h2>

<div class="price">
1 dona: ${food.price.toLocaleString()} so'm
</div>

<div class="item-total">
Jami: <span class="item-price">0</span> so'm
</div>

<div class="controls">

<button class="minus">-</button>

<div class="count">0</div>

<button class="plus">+</button>

</div>

</div>

`;

menu.appendChild(card);

let quantity = 0;

const plus = card.querySelector(".plus");
const minus = card.querySelector(".minus");
const count = card.querySelector(".count");
const itemPrice = card.querySelector(".item-price");

plus.onclick = () => {

quantity++;

count.innerText = quantity;

const currentTotal = quantity * food.price;

itemPrice.innerText =
currentTotal.toLocaleString();

totalPrice += food.price;

totalItems++;

if(cart[food.name]){

cart[food.name].quantity++;

}else{

cart[food.name] = {
price: food.price,
quantity:1
};

}

update();

}

minus.onclick = () => {

if(quantity > 0){

quantity--;

count.innerText = quantity;

const currentTotal = quantity * food.price;

itemPrice.innerText =
currentTotal.toLocaleString();

totalPrice -= food.price;

totalItems--;

cart[food.name].quantity--;

if(cart[food.name].quantity <= 0){

delete cart[food.name];

}

update();

}

}

});

function update(){

document.getElementById("items").innerText =
totalItems;

document.getElementById("total").innerText =
totalPrice.toLocaleString();

}

function orderNow(){

const name =
document.getElementById("name").value;

const service =
document.getElementById("service").value;

const address =
document.getElementById("address").value;

const payment =
document.getElementById("payment").value;

if(totalItems == 0){

alert("Mahsulot tanlang!");
return;

}

if(name == ""){

alert("Ismingizni kiriting!");
return;

}

if(service == "delivery" && address == ""){

alert("Manzilni kiriting!");
return;

}

document.getElementById("receipt").style.display =
"block";

let receiptHTML = "";

for(let item in cart){

receiptHTML += `

<p>
🍴 ${item} × ${cart[item].quantity}
=
${(cart[item].price * cart[item].quantity).toLocaleString()} so'm
</p>

`;

}

document.getElementById("receipt-items").innerHTML =
receiptHTML;

document.getElementById("customer").innerHTML =
"👤 Mijoz: " + name;

document.getElementById("serviceType").innerHTML =
service == "delivery"
?
"🚚 Xizmat: Dostavka"
:
"🍴 Xizmat: Restoranda";

document.getElementById("delivery").innerHTML =
service == "delivery"
?
"📍 Manzil: " + address
:
"📍 Stol band qilindi";

document.getElementById("paymentType").innerHTML =
"💳 To'lov: " + payment;

document.getElementById("productCount").innerHTML =
"🍽️ Mahsulotlar soni: " + totalItems;

document.getElementById("finalPrice").innerHTML =
"💰 Jami summa: " +
totalPrice.toLocaleString() +
" so'm";

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
